<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
        }

        .login-card h2 {
            margin-bottom: 24px;
            font-weight: 600;
            text-align: center;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        .shake-effect {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        .error-msg {
            color: #ff8e8e;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card" id="loginCard">

        <h2>Login</h2>

        <div th:if="${param.error}" id="loginAlert" class="alert-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="alertMessage">Invalid email or password.</span>
        </div>

        <form id="loginForm" method="POST" th:action="@{/login}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="name@example.com" autocomplete="username"
                    required>
                <div id="emailError" class="error-msg">Please enter a valid email address.</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••"
                    autocomplete="current-password" required>
                <button type="button" class="toggle-password" id="togglePass">Show</button>
                <div id="passwordError" class="error-msg">Password must be at least 6 characters.</div>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>

    </div>

    <script>

        const togglePass = document.getElementById('togglePass');
        const passwordInput = document.getElementById('password');


        togglePass.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePass.textContent = type === 'password' ? 'Show' : 'Hide';
        });

    </script>

    <script th:inline="javascript">

        let hasError = [[${ param.error != null }]];
        if (hasError) {

            function shake() {
                console.log('shake-effect');
                const loginCard = document.getElementById('loginCard');
                loginCard.classList.remove('shake-effect');
                void loginCard.offsetWidth;
                loginCard.classList.add('shake-effect');
                window.removeEventListener('load', shake);
            }

            window.addEventListener('load', shake);

        }
    </script>

</body>

</html>
