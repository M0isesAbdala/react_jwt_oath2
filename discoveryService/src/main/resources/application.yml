logging:
  level:
    com.netflix.eureka: ${DEBUG_LOG_LEVEL}
    com.netflix.discovery: ${DEBUG_LOG_LEVEL}
server:
  port: ${DISCOVERY_SERVICE_PORT}
spring:
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
  application:
    name: ${DISCOVERY_SERVICE_NAME}
eureka:
  instance:
    hostname: ${DISCOVERY_SERVICE_NAME}
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/